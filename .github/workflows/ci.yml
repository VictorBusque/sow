name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint + type-check + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for SCM versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --no-progress

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check (ty, strict)
        run: uv run ty check .

      - name: Tests
        run: uv run pytest

  build:
    name: build package
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - name: Checkout (full history + tags for SCM versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Build
        run: uv build --no-progress

      - name: Release gate — tag must match built version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          whl="$(basename dist/*.whl)"
          built="${whl#sow_cli-}"
          built="${built%-py3-none-any.whl}"
          echo "tag version:   $tag"
          echo "built version: $built"
          if [ "$built" != "$tag" ]; then
            echo "::error::tag ($tag) does not match built version ($built); package version is derived from git tags" >&2
            exit 1
          fi
          case "$built" in
            *.dev*|*+*)
              echo "::error::refusing to publish a dev/dirty version ($built); tag an exact clean commit" >&2
              exit 1 ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running a tag that already published must not hard-fail;
          # PyPI rejects filename reuse regardless of cause.
          skip-existing: true
